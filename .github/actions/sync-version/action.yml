name: Sync package.json version
description: >
  Ensures package.json version matches the release tag.
  Strips a leading 'v' from the tag, validates it is valid semver,
  and bumps package.json with --no-git-tag-version when necessary.

inputs:
  tag:
    description: The release tag name (e.g. v1.2.3 or 1.2.3)
    required: true

runs:
  using: composite
  steps:
    - name: Sync version
      shell: bash
      run: |
        TAG="${{ inputs.tag }}"
        VERSION="${TAG#v}"
        if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
          echo "Error: release tag '$TAG' does not contain a valid semver version (got '$VERSION')"
          exit 1
        fi
        PKG_VERSION=$(node -p "require('./package.json').version")
        if [ "$VERSION" != "$PKG_VERSION" ]; then
          echo "Bumping package.json version from $PKG_VERSION to $VERSION"
          npm version "$VERSION" --no-git-tag-version
        else
          echo "package.json version $PKG_VERSION already matches release tag $TAG"
        fi
