# Publishes the package to npm and GitHub Packages on every release.
#
# Required secrets:
#   - NPM_TOKEN: An npm access token with "Automation" type and publish
#                permissions for the @bfiessinger scope.
#                Create it at https://www.npmjs.com/settings/<your-username>/tokens
#                and add it as a repository secret named NPM_TOKEN.
#

name: Publish Package

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Sync package.json version with release tag
        uses: ./.github/actions/sync-version
        with:
          tag: ${{ github.event.release.tag_name }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js for npm registry
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Sync package.json version with release tag
        uses: ./.github/actions/sync-version
        with:
          tag: ${{ github.event.release.tag_name }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
